<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión | UniNotas</title>
    <link rel="icon" href="Barra/iconfinder-document03-1622833_121957.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body id="pagina-login">
    <header>
        <div class="header-logo">
            <span>UN</span>
        </div>
        <span class="header-titulo">UniNotas</span>
        <p>Sistema de Gestión de Notas Universitarias</p>
        <div class="header-iconos">
            <i class="fa-solid fa-house"></i>
            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-envelope"></i>
            <i class="fa-solid fa-phone"></i>
            <i class="fa-solid fa-cart-shopping"></i>
            <i class="fa-solid fa-heart"></i>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
        </div>
    </header>

    <main class="container">
        <div class="card-uninotas card-login mx-auto mt-4" style="max-width: 430px;">
            <h2 class="text-center text-primary fw-bold" style="color: #1a3c6e !important;">Inicio de Sesión</h2>
            <p class="text-center text-muted">Únicamente se debe ingresar con credenciales universitarias</p>
            <hr>
            <form action="principal.html" method="post">
                <div class="mb-3">
                    <label for="correo" class="form-label fw-bold">Correo electrónico</label>
                    <input type="email" class="form-control" id="correo" name="correo" placeholder="correo@universidad.edu.ec" required />
                </div>
                <div class="mb-4">
                    <label for="contrasena" class="form-label fw-bold">Contraseña</label>
                    <input type="password" class="form-control" id="contrasena" name="contrasena" placeholder="Entre 8 y 16 caracteres" minlength="8" maxlength="16" required />
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Ingresar al Sistema</button>
                </div>
            </form>
            <p class="text-center mt-3">
                ¿No tienes una cuenta? <a href="registro.html" style="color: #1a3c6e; font-weight: bold;">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Anndy Tomalo &mdash; Sistema de Gestión de Notas Universitarias</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
