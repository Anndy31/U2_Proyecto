<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | UniNotas</title>
    <link rel="icon" href="Barra/services_application_3009.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/registro.css">
</head>

<!-- AQUÍ: Faltaba el id "pagina-registro" para que el CSS funcione -->
<body id="pagina-registro">
    <header>
        <div class="header-logo">
            <span>UN</span>
        </div>
        <span class="header-titulo">UniNotas</span>
        <p>Sistema de Gestión de Notas Universitarias</p>
    </header>

    <main class="container mt-4 mb-5">
        <!-- AQUÍ: Eliminé el style en línea e incluí tu clase "card-registro" -->
        <div class="card-registro mx-auto">
            <h2 class="text-center fw-bold" style="color: #1e7e34;">Crear Cuenta</h2>
            <p class="text-center text-muted mb-4">Completa todos los campos para registrarte en el sistema</p>
            <hr class="mb-4">

            <form action="principal.html" method="post">
                <div class="mb-3">
                    <label for="nombres" class="form-label fw-bold">Nombres</label>
                    <input type="text" class="form-control bg-light" id="nombres" name="nombres" placeholder="Ej: Juan Carlos" required />
                </div>
                <div class="mb-3">
                    <label for="apellidos" class="form-label fw-bold">Apellidos</label>
                    <input type="text" class="form-control bg-light" id="apellidos" name="apellidos" placeholder="Ej: Pérez Torres" required />
                </div>
                <div class="mb-3">
                    <label for="cedula" class="form-label fw-bold">Cédula de Identidad</label>
                    <input type="text" class="form-control bg-light" id="cedula" name="cedula" placeholder="Ej: 1712345678" minlength="10" maxlength="10" required />
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fecha_nacimiento" class="form-label fw-bold">Fecha de Nacimiento</label>
                        <input type="date" class="form-control bg-light" id="fecha_nacimiento" name="fecha_nacimiento" required />
                    </div>
                    <div class="col-md-6 mt-3 mt-md-0">
                        <label for="genero" class="form-label fw-bold">Género</label>
                        <select class="form-select bg-light" id="genero" name="genero" required>
                            <option value="">-- Selecciona --</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Prefiero no decir</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="semestre" class="form-label fw-bold">Semestre</label>
                    <select class="form-select bg-light" id="semestre" name="semestre" required>
                        <option value="">-- Selecciona tu semestre --</option>
                        <option value="1">1er Semestre</option>
                        <option value="2">2do Semestre</option>
                        <option value="3">3er Semestre</option>
                        <option value="4">4to Semestre</option>
                        <option value="5">5to Semestre</option>
                        <option value="6">6to Semestre</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="correo_registro" class="form-label fw-bold">Correo Institucional</label>
                    <input type="email" class="form-control bg-light" id="correo_registro" name="correo_registro" placeholder="correo@universidad.edu.ec" required />
                </div>
                <div class="mb-4">
                    <label for="contrasena_registro" class="form-label fw-bold">Contraseña</label>
                    <input type="password" class="form-control bg-light" id="contrasena_registro" name="contrasena_registro" placeholder="Entre 8 y 16 caracteres" minlength="8" maxlength="16" required />
                </div>
                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-success btn-lg fw-bold">Registrarme</button>
                </div>
            </form>

            <p class="text-center mt-4">
                <!-- AQUÍ: Eliminé el style en línea y le asigne la clase link-login -->
                ¿Ya tienes cuenta? <a href="index.html" class="link-login">Inicia sesión aquí</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Anndy Tomalo &mdash; Sistema de Gestión de Notas Universitarias</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
